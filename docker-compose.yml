services:
  mysql:
    image: mysql:8.0
    container_name: mobilya-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mobilya
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: mobilya
      MYSQL_PASSWORD: mobilya
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: mobilya-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: mobilya-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mysql_data:


